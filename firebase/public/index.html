<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Event Display</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    h2 {
      color: #0066cc;
    }
    .event-box {
      background: white;
      border-radius: 10px;
      width: 300px;
      margin: 10px auto;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: left;
    }
    .event-box h3 {
      margin: 0;
      color: #333;
    }
    .event-box p {
      margin: 5px 0;
      color: #666;
    }
  </style>
</head>
<body>
  <h2>📅 Upcoming Events</h2>

  <div class="event-box">
    <h3>Science Fair</h3>
    <p><b>Date:</b> 15 Oct 2025</p>
    <p><b>Venue:</b> School Auditorium</p>
  </div>

  <div class="event-box">
    <h3>Coding Workshop</h3>
    <p><b>Date:</b> 20 Oct 2025</p>
    <p><b>Venue:</b> Computer Lab</p>
  </div>

  <div class="event-box">
    <h3>Sports Meet</h3>
    <p><b>Date:</b> 25 Oct 2025</p>
    <p><b>Venue:</b> Playground</p>
  </div>
</body>
</html>
